<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>購入履歴</title>
	<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<header>
    <h1>購入履歴（モック画面）</h1>
    <small>※今はただのHTML。あとでSpring Bootとつなぐ。</small>
</header>

<main>

    <!-- 購入履歴リスト -->
    <section class="section" id="history">
        <h2>購入履歴</h2>
        <small>直近50件くらいを想定</small>

        <table>
            <thead>
            <tr>
                <th>購入日</th>
                <th>品目名</th>
                <th>数量</th>
                <th>単位</th>
                <th>操作</th>
            </tr>
            </thead>
            <tbody>
            <!-- ダミーデータ -->
            <tr>
                <td>2025-11-15</td>
                <td>卵</td>
                <td>10</td>
                <td>個</td>
                <td><button>再投入</button></td>
            </tr>
            <tr>
                <td>2025-11-10</td>
                <td>玉ねぎ</td>
                <td>5</td>
                <td>個</td>
                <td><button>再投入</button></td>
            </tr>
            <tr>
                <td>2025-11-03</td>
                <td>豚ひき肉</td>
                <td>500</td>
                <td>g</td>
                <td><button>再投入</button></td>
            </tr>
            </tbody>
        </table>
    </section>

</main>

</body>
</html>
