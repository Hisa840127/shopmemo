<!DOCTYPE html>
<html lang="ja">

<head>
	<meta charset="UTF-8">
	<title>購入履歴</title>
	<link rel="stylesheet" href="/css/style.css">
</head>

<body>
	<header>
		<h1>購入履歴</h1>
	</header>

	<main>

		<!-- 購入履歴リスト -->
		<section class="section" id="history">
			<h2>購入履歴</h2>
			<small>直近50件くらいを想定</small>

			<table>
				<thead>
					<tr>
						<th>購入日</th>
						<th>品目名</th>
						<th>数量</th>
						<th>単位</th>
						<th>購入店舗</th>
						<th>操作</th>
					</tr>
				</thead>
				<tbody>
					<tr th:each="item : ${historyItems}">
						<td th:text="${item.purchaseDate}"></td>
						<td th:text="${item.name}"></td>
						<td th:text="${item.quantity}"></td>
						<td th:text="${item.unit}"></td>
						<td th:text="${item.shopName}"></td>
						<!--
						<重要>

						【この部分は何をしている？】

						購入履歴(HistoryItem)の一覧を
						表(table)として表示している。

						Controllerから渡された historyItems を
						1件ずつ取り出して表示している。→補足4参照


						【最低限どこを見る？】

						th:each="item : ${historyItems}"

						↓

						historyItems を1件ずつ取り出す


						<td>

						↓

						表の1マス


						th:text="${item.name}"

						↓

						item の値を表示


						【ざっくり流れ】

						Controller

						↓

						model.addAttribute(
						        "historyItems",
						        historyItems)

						↓

						history.html

						↓

						th:each

						↓

						1件ずつ item として取り出す

						↓

						th:text

						↓

						画面へ表示


						【覚えておけば十分なこと】

						・購入履歴一覧を表示している

						・th:each が繰り返し処理　

						・th:text が値の表示

						・細かい補足を忘れても、
						  「履歴一覧を表示する部分」
						  と分かればOK
						-->
						<!--
						<補足1>

						<td>

						はHTMLのタグ。

						table の中で使われる
						表の1マスを表す。

						例：

						<td>卵</td>

						↓

						表の1セルとして表示される。


						今回のコードでは、

						<td th:text="${item.name}"></td>

						となっているため、

						Thymeleafが値を埋め込んだ後は、

						<td>卵</td>

						のようなHTMLになる。
						-->
						<!--
						<補足2>

						th:text は
						Thymeleafの属性。

						例：

						th:text="${item.name}"

						↓

						item.name を取得

						↓

						HTMLへ表示


						イメージ：

						item.name = "卵"

						↓

						<td>卵</td>


						item.quantity = 10

						↓

						<td>10</td>


						のようになる。
						-->
						<!--
						<補足3>

						見た目に関する処理は
						主にCSSが担当している。

						例：

						th, td {
						    border: 1px solid #ccc;
						    padding: 6px 8px;
						}

						↓

						<td>

						に対して、

						・枠線

						・余白

						・文字サイズ

						などが適用される。


						役割の違い：

						<td>
						↓

						HTML
						（表のマス）


						th:text
						↓

						Thymeleaf
						（中身を埋める）


						th, td { ... }
						↓

						CSS
						（見た目を整える）
						-->
						<!--
						<補足4>

						th:each は、
						Thymeleafの繰り返し処理。

						Javaの foreach と
						ほぼ同じ考え方で使える。


						例：

						<tr th:each="item : ${historyItems}">

						↓

						historyItems の中身を
						1件ずつ取り出して、

						item という変数へ入れる。


						Javaで書くと、

						for (HistoryItem item : historyItems) {

						}

						に近い。


						イメージ：

						historyItems

						↓

						[卵]
						[牛乳]
						[パン]

						↓

						1件目

						item = 卵

						↓

						2件目

						item = 牛乳

						↓

						3件目

						item = パン


						そのため、

						${item.name}

						は、

						Javaでいう

						item.getName()

						に近い。


						対応関係：

						th:each

						↓

						foreach


						item

						↓

						1件分のHistoryItem


						${item.name}

						↓

						item.getName()


						ポイント：

						th:each は
						Thymeleaf独自の呪文というより、

						Javaの foreach を
						HTML上で書いているイメージ。
						-->
						
						<td>
							<!--再投入ボタン-->
							<form th:action="@{/readd/edit}" method="get">
							    <input type="hidden" name="id" th:value="${item.id}">
							    <button type="submit">再投入</button>
							</form>
							<!--
							<重要>

							【この部分は何をしている？】

							再投入編集画面を開くためのフォーム。

							購入履歴のIDをControllerへ送り、
							showReaddEdit() を実行している。


							【最低限どこを見る？】

							th:action="@{/readd/edit}"

							↓

							/readd/edit へ送信


							<input type="hidden"
							       name="id"
							       th:value="${item.id}">

							↓

							履歴IDを送信


							<button type="submit">

							↓

							再投入ボタン


							【ざっくり流れ】

							再投入ボタン押下
							↓

							履歴ID送信

							↓

							showReaddEdit()

							↓

							HistoryItem取得

							↓

							Modelへ格納

							↓

							readd-edit.html表示


							【覚えておけば十分なこと】

							・再投入編集画面を開くフォーム

							・履歴IDを送信している

							・showReaddEdit() が呼ばれる

							・細かい補足を忘れても、
							  「編集画面へ移動するボタン」
							  と分かればOK
							-->
							<!--
							<補足1>

							form は、
							入力データを送信するためのHTMLタグ。

							今回のフォームでは、

							再投入ボタン押下
							↓

							/readd/edit へ送信

							↓

							Controllerの
							showReaddEdit() 実行

							という流れになる。


							th:action は
							Thymeleaf用の属性。

							例：

							th:action="@{/readd/edit}"

							↓

							/readd/edit へ送信

							という意味。


							対応するControllerは、

							@GetMapping("/readd/edit")

							である。
							-->
							<!--
							<補足2>

							<input type="hidden">

							は、
							画面に表示しない入力項目。

							今回は、

							name="id"

							でHistoryItemのIDを保持している。


							例：

							item.id = 5

							↓

							<input value="5">

							になる。


							送信時は、

							id=5

							というデータが
							Controllerへ送られる。


							hidden は、

							「ユーザーに見せるため」

							ではなく、

							「Controllerへ渡すため」

							のデータに使われることが多い。


							実際にユーザーへ表示して
							入力してもらう場合は、

							<input type="text">

							などを使用する。

							例：

							・新規追加フォーム

							・再投入編集フォーム
							-->
							
							<!--
							<補足3>

							送信されたデータは、

							@RequestParam

							で受け取れる。


							例：

							<input
							    type="hidden"
							    name="id">

							↓

							@RequestParam Long id


							name="id"

							と

							@RequestParam Long id

							が対応している。


							そのため、

							showReaddEdit(
							        @RequestParam Long id,
							        Model model)

							の id に、

							送信された履歴IDが入る。
							-->
						</td>
					</tr>
				</tbody>
			</table>
			<nav class="actions">
				<a href="/">トップへ戻る</a>
				<a href="/list">買う物リストを見る</a>
			</nav>
		</section>

	</main>

</body>

</html>
