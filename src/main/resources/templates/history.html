<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>購入履歴</title>
	<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<header>
    <h1>購入履歴（モック画面）</h1>
    <small>※今はただのHTML。あとでSpring Bootとつなぐ。</small>
</header>

<main>

    <!-- 購入履歴リスト -->
    <section class="section" id="history">
        <h2>購入履歴</h2>
        <small>直近50件くらいを想定</small>

        <table>
            <thead>
            <tr>
                <th>購入日</th>
                <th>品目名</th>
                <th>数量</th>
                <th>単位</th>
				<th>購入店舗</th>
                <th>操作</th>
            </tr>
            </thead>
            <tbody>
				<tbody>
				<tr th:each="item : ${items}">
				    <td th:text="${item.purchaseDate}"></td>
				    <td th:text="${item.name}"></td>
				    <td th:text="${item.quantity}"></td>
				    <td th:text="${item.unit}"></td>
					<td th:text="${item.shopName}"></td>
				    <td><button>再投入</button></td>
				</tr>
				</tbody>
            </tr>
            </tbody>
        </table>
    </section>

</main>

</body>
</html>
