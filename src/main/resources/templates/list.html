<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>買うものリスト</title>
	<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<header>
    <h1>買うものリスト（モック画面）</h1>
    <small>※今はただのHTML。あとでSpring Bootとつなぐ。</small>
</header>

<main>

    <!-- 現在の買い物リスト -->
    <section class="section" id="current-list">
        <h2>現在の買い物リスト</h2>

        <table>
            <thead>
            <tr>
                <th>品目名</th>
                <th>数量</th>
                <th>単位</th>
				<th>購入店舗</th>
                <th>メモ</th>
                <th>操作</th>
            </tr>
            </thead>
			<tbody>
			<tr th:each="item : ${items}">
			    <td th:text="${item.name}"></td>
			    <td th:text="${item.quantity}"></td>
			    <td th:text="${item.unit}"></td>
				<td th:text="${item.shopName}"></td>
			    <td th:text="${item.memo}"></td>
				<td>
					<!-- 購入ボタン押下時に、この行の item.id を hidden で送信する -->
				    <form th:action="@{/purchase}" method="post">
				        <input type="hidden" name="id" th:value="${item.id}">
				        <button type="submit">購入</button>
				    </form>
				</td>

			</tr>
			</tbody>

        </table>

        <div class="actions">
            <button>まとめて購入処理する</button>
        </div>
    </section>

</main>

</body>
</html>

<!--
  学習メモ：
  ・購入ボタンは submit（送信トリガー）
  ・hidden の id は「どの Item を購入したか」をサーバに伝えるため
  ・hidden は画面には出ないが、POST時に一緒に送信される
-->
